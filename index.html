<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShazRics — Nigerian lyrics party game</title>

    <!-- Apply the saved/system theme before first paint (no flash of light). -->
    <script>
      (function () {
        try {
          var p = JSON.parse(localStorage.getItem('shazrics:prefs') || '{}');
          var t = p.theme || 'system';
          var dark = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {}
      })();
    </script>

    <!-- PWA: installable + offline (Anton font is self-hosted via @font-face in base.css) -->
    <meta name="theme-color" content="#6D4C7D" />
    <meta name="description" content="A Nigerian song-lyrics party game." />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ShazRics" />

    <!-- Styles, split out of the prototype's <style> block (look unchanged) -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/screens.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/dark.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-pill"><span class="brand-pill__mark">SR</span> ShazRics</div>
        <div class="topbar__right">
          <div class="step-pill" id="step-pill">1 / 7 Home</div>
          <button class="theme-btn" id="theme-btn" aria-label="Switch to dark mode">🌙</button>
          <button class="mute-btn" id="mute-btn" aria-label="Mute sound" aria-pressed="false">🔊</button>
        </div>
      </header>

      <!-- Seven screen shells. Each is filled by its js/screens/* module, driven
           by gameState.phase. Markup/classes are reproduced there to keep the
           look identical to the prototype. -->
      <main class="screen-stack">
        <section class="screen is-visible" id="home-screen"></section>
        <section class="screen" id="setup-screen"></section>
        <section class="screen" id="turn-screen"></section>
        <section class="screen" id="play-screen"></section>
        <section class="screen" id="summary-screen"></section>
        <section class="screen" id="scoreboard-screen"></section>
        <section class="screen" id="reveal-screen"></section>
        <section class="screen" id="settings-screen"></section>
        <section class="screen" id="howto-screen"></section>
        <section class="screen" id="banks-screen"></section>
      </main>
    </div>

    <!-- Animation / sound / confetti libs — vendored locally so the app works
         offline. Loaded before the app module so window globals exist. -->
    <script src="assets/vendor/gsap.min.js"></script>
    <script src="assets/vendor/Flip.min.js"></script>
    <script src="assets/vendor/howler.min.js"></script>
    <script src="assets/vendor/confetti.browser.min.js"></script>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
